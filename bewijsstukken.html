<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bewijsstukken | Selim Serik</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .evidence-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            margin-top: 2rem;
        }

        .document-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 800px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .doc-btn {
            display: block;
            padding: 12px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: left;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .doc-btn:hover { background: #f0f7ff; border-color: #0056b3; }
        .doc-btn.active { background: #0056b3; color: #fff; border-color: #0056b3; }

        .viewer-container {
            border: 2px solid #ddd;
            border-radius: 8px;
            height: 800px;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
        }

        iframe { width: 100%; height: 100%; border: none; border-radius: 0 0 8px 8px; }
        
        .viewer-header {
            padding: 10px;
            background: #eee;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            font-size: 0.8rem;
        }

        /* Scrollbar styling voor het menu */
        .document-menu::-webkit-scrollbar { width: 6px; }
        .document-menu::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        @media (max-width: 1000px) {
            .evidence-layout { grid-template-columns: 1fr; }
            .viewer-container { height: 500px; }
            .document-menu { max-height: none; }
        }
    </style>
</head>
<body>

    <div class="page-layout">
        <aside class="sidebar">
            <nav class="site-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="over-mij.html">Over mij</a></li>
                    <li><a href="cv.html">CV</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="onderwijsontwikkeling.html">Onderwijsontwikkeling</a></li>
                    <li><a href="onderzoek-innovatie.html">Onderzoek & Innovatie</a></li>
                    <li><a href="bewijsstukken.html" aria-current="page">Bewijsstukken</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <section class="container content-page">
                <h1>Bewijsstukken</h1>
                <p>Selecteer een document om de bewijslast direct in te zien.</p>

                <div class="evidence-layout">
                    <div class="document-menu">
                        <!-- Categorie: Beleid & Ontwikkeling -->
                        <button class="doc-btn" onclick="openPDF('Plan van Aanpak Vroegsignalering Team Software Developer.pdf', this)">
                            <strong>Beleid:</strong> PvA Vroegsignalering
                        </button>
                        <button class="doc-btn" onclick="openPDF('BPV-Lesprogramma-20-weken.pdf', this)">
                            <strong>Onderwijs:</strong> BPV Lesprogramma (20 weken)
                        </button>
                        <button class="doc-btn" onclick="openPDF('Onderzoek stagebedrijven.pdf', this)">
                            <strong>Onderzoek:</strong> Stagebedrijven
                        </button>

                        <!-- Categorie: Feedback & Beoordeling -->
                        <button class="doc-btn" onclick="openPDF('360-graden-feedback-formulier - Gerald Muller.pdf', this)">
                            <strong>Feedback:</strong> 360° Gerald Muller
                        </button>
                        <button class="doc-btn" onclick="openPDF('Feedback Selim door Nina Jopp.pdf', this)">
                            <strong>Feedback:</strong> Nina Jopp (Teamdeskundige)
                        </button>
                        <button class="doc-btn" onclick="openPDF('17078628473.5-Format-beoordelingsgesprek-Wendy Martens.pdf', this)">
                            <strong>Beoordeling:</strong> Gesprek Wendy Martens
                        </button>

                        <!-- Categorie: Kwaliteit & Organisatie -->
                        <button class="doc-btn" onclick="openPDF('Feedbackformulier_opleidingscommissie Rudie Schreurs.pdf', this)">
                            <strong>Kwaliteit:</strong> Opleidingscommissie
                        </button>
                        <button class="doc-btn" onclick="openPDF('Feedbackformulier_stagebureau Bert ten Kate.pdf', this)">
                            <strong>Kwaliteit:</strong> Stagebureau
                        </button>
                        <button class="doc-btn" onclick="openPDF('Rapport_groep_Selimserik05_10083521pm.pdf', this)">
                            <strong>Rapportage:</strong> Groepsrapportage 05
                        </button>
                        <button class="doc-btn" onclick="openPDF('Standaard gespreksleidraad 1-op-1 gesprekken – Vroegsignalering.pdf', this)">
                            <strong>Tool:</strong> Gespreksleidraad 1-op-1
                        </button>
                    </div>

                    <div class="viewer-container">
                        <div class="viewer-header" id="viewer-title">Selecteer een bestand uit de lijst</div>
                        <iframe id="pdf-frame" src=""></iframe>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function openPDF(fileName, btn) {
            const frame = document.getElementById('pdf-frame');
            const title = document.getElementById('viewer-title');
            
            // Pad naar de assets map
            const safePath = 'assets/' + encodeURIComponent(fileName);
            
            frame.src = safePath;
            title.innerText = "Document: " + fileName;

            // Actieve status bijwerken
            document.querySelectorAll('.doc-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
