<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bewijsstukken | Selim Serik</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .evidence-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            margin-top: 2rem;
        }

        .document-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .doc-btn {
            display: block;
            padding: 12px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
            text-align: left;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .doc-btn:hover { background: #f0f7ff; border-color: #0056b3; }
        .doc-btn.active { background: #0056b3; color: #fff; }

        .viewer-container {
            border: 2px solid #ddd;
            border-radius: 8px;
            height: 800px;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
        }

        iframe { width: 100%; height: 100%; border: none; border-radius: 0 0 8px 8px; }
        
        .viewer-header {
            padding: 10px;
            background: #eee;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            font-size: 0.8rem;
        }

        @media (max-width: 1000px) {
            .evidence-layout { grid-template-columns: 1fr; }
            .viewer-container { height: 500px; }
        }
    </style>
</head>
<body>

    <div class="page-layout">
        <aside class="sidebar">
            <nav class="site-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="over-mij.html">Over mij</a></li>
                    <li><a href="bewijsstukken.html" aria-current="page">Bewijsstukken</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <section class="container content-page">
                <h1>Bewijsstukken</h1>
                <p>Klik op een document om het direct hiernaast te bekijken.</p>

                <div class="evidence-layout">
                    <div class="document-menu">
                        <!-- Bestandsnamen zijn nu EXACT zoals in je screenshot -->
                        <button class="doc-btn" onclick="openPDF('Plan van Aanpak Vroegsignalering Team Software Developer.pdf', this)">
                            Plan van Aanpak Vroegsignalering
                        </button>
                        <button class="doc-btn" onclick="openPDF('360-graden-feedback-formulier - Gerald Muller.pdf', this)">
                            360-graden feedback - Gerald Muller
                        </button>
                        <button class="doc-btn" onclick="openPDF('Feedback Selim door Nina Jopp.pdf', this)">
                            Feedback door Nina Jopp
                        </button>
                        <button class="doc-btn" onclick="openPDF('Feedbackformulier_opleidingscommissie Rudie Schreurs.pdf', this)">
                            Feedback Opleidingscommissie
                        </button>
                        <button class="doc-btn" onclick="openPDF('Feedbackformulier_stagebureau Bert ten Kate.pdf', this)">
                            Feedback Stagebureau
                        </button>
                        <button class="doc-btn" onclick="openPDF('Rapport_groep_Selimserik05_10083521pm.pdf', this)">
                            Groepsrapportage 05
                        </button>
                        <button class="doc-btn" onclick="openPDF('Standaard gespreksleidraad 1-op-1 gesprekken – Vroegsignalering.pdf', this)">
                            Standaard gespreksleidraad
                        </button>
                        <button class="doc-btn" onclick="openPDF('17078628473.5-Format-beoordelingsgesprek-Wendy Martens.pdf', this)">
                            Beoordelingsgesprek Wendy Martens
                        </button>
                    </div>

                    <div class="viewer-container">
                        <div class="viewer-header" id="viewer-title">Selecteer een bestand</div>
                        <iframe id="pdf-frame" src=""></iframe>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function openPDF(fileName, btn) {
            const frame = document.getElementById('pdf-frame');
            const title = document.getElementById('viewer-title');
            
            // We gebruiken encodeURIComponent om de spaties en vreemde tekens (zoals de –) veilig te maken voor de browser
            const safePath = 'assets/' + encodeURIComponent(fileName);
            
            frame.src = safePath;
            title.innerText = "Bezig met laden: " + fileName;

            // Knop op actief zetten
            document.querySelectorAll('.doc-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
