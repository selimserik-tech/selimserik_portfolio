<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bewijsstukken | Selim Serik</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .evidence-grid {
            display: grid;
            grid-template-columns: 1fr 2fr; /* Links de lijst, rechts de viewer */
            gap: 20px;
            margin-top: 2rem;
        }
        .evidence-list { list-style: none; padding: 0; }
        .evidence-link {
            display: block;
            padding: 15px;
            background: #f8f9fa;
            margin-bottom: 10px;
            border-radius: 5px;
            text-decoration: none;
            color: #333;
            border: 1px solid #ddd;
            cursor: pointer;
        }
        .evidence-link:hover { background: #e9ecef; border-color: var(--primary-color); }
        
        /* De PDF Viewer container */
        .pdf-container {
            border: 2px solid #ddd;
            border-radius: 8px;
            height: 800px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 20px;
        }
        iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }

        @media (max-width: 900px) {
            .evidence-grid { grid-template-columns: 1fr; }
            .pdf-container { height: 500px; }
        }
    </style>
</head>
<body>

    <div class="page-layout">
        <aside class="sidebar">
            <nav class="site-nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="over-mij.html">Over mij</a></li>
                    <li><a href="bewijsstukken.html" aria-current="page">Bewijsstukken</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <section class="container content-page">
                <h1>Bewijsstukken</h1>
                <p>Klik op een document om het direct hieronder te bekijken.</p>

                <div class="evidence-grid">
                    <!-- Linkerkolom: De lijst -->
                    <div class="evidence-menu">
                        <a onclick="openPDF('assets/Plan%20van%20Aanpak%20Vroegsignalering.pdf')" class="evidence-link">
                            <strong>📄 Plan van Aanpak Vroegsignalering</strong>
                        </a>
                        <a onclick="openPDF('assets/360-graden-feedback-formulier.pdf')" class="evidence-link">
                            <strong>📄 360-graden Feedback</strong>
                        </a>
                        <a onclick="openPDF('assets/Rapport_groep_Selimserik05_1.pdf')" class="evidence-link">
                            <strong>📄 Groepsrapportage 05</strong>
                        </a>
                    </div>

                    <!-- Rechterkolom: De viewer -->
                    <div class="pdf-container" id="viewer-container">
                        <p id="placeholder-text">Selecteer een document om het te bekijken</p>
                        <iframe id="pdf-viewer" style="display:none;"></iframe>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function openPDF(fileUrl) {
            const iframe = document.getElementById('pdf-viewer');
            const placeholder = document.getElementById('placeholder-text');
            
            iframe.src = fileUrl;
            iframe.style.display = 'block';
            placeholder.style.display = 'none';
        }
    </script>
</body>
</html>
